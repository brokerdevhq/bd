name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  poly-check:
    name: Polylith Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run poly check
        run: nix-shell --run "poly check"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run tests
        run: nix-shell --run "bb test"
